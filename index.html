<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlixID — Nonton Film, Serial & Anime Terbaru</title>
  
  <!-- SEO Meta Tags -->
  <meta name="description" content="Temukan film trending, serial TV, dan anime terbaru. Cek di mana bisa nonton legal di Netflix, Disney+, Prime Video, Viu dan lainnya.">
  <meta name="robots" content="index, follow">

  <style>
    /* CSS Dasar */
    :root { 
      --red: #E50914; 
      --dark: #0f0f0f; 
      --text: #fff; 
      --muted: #b3b3b3; 
    }
    body { background: var(--dark); color: var(--text); font-family: sans-serif; margin: 0; }
    
    /* Navigasi */
    nav { display: flex; justify-content: space-between; padding: 20px 40px; background: #000; align-items: center; }
    .logo { font-weight: bold; font-size: 24px; color: var(--red); }
    
    /* Hero */
    .hero { height: 70vh; background-size: cover; background-position: center; display: flex; align-items: flex-end; padding: 40px; }
    
    /* Grid Artikel (15 Artikel) */
    .section { padding: 40px; }
    #main-row { 
      display: grid; 
      grid-template-columns: repeat(6, 1fr); 
      gap: 15px; 
    }
    @media(max-width:768px) { #main-row { grid-template-columns: repeat(3, 1fr); } }
    
    .card { cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
    .card:hover { transform: scale(1.05); }
    .card img { width: 100%; border-radius: 8px; display: block; }
    .card-title { font-size: 14px; margin-top: 8px; color: #fff; }

    /* Footer Lengkap */
    footer { padding: 40px; border-top: 1px solid #333; text-align: center; margin-top: 50px; }
    footer a { color: var(--muted); margin: 0 15px; text-decoration: none; font-size: 14px; }
    
    /* Modal & Kamuflase Player */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; padding: 20px; }
    .modal-overlay.open { display: flex; }
    .modal { background: #181818; width: 100%; max-width: 700px; padding: 20px; border-radius: 15px; max-height: 90vh; overflow-y: auto; }
    .trailer-wrap { width: 100%; padding-top: 56%; position: relative; background: #000; }
    .trailer-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
    .btn-secret-stream { background: var(--red); color: white; width: 100%; padding: 15px; border: none; margin-top: 20px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <nav>
    <div class="logo">FlixID</div>
    <input type="text" placeholder="Cari film...">
  </nav>

  <div class="hero" id="hero-bg">
    <div style="max-width: 500px;">
      <h1 id="hero-title">Memuat...</h1>
      <button class="btn-play" id="hero-trailer-btn">▶ Tonton Trailer</button>
    </div>
  </div>

  <div class="section">
    <div id="main-row"></div>
    <div style="text-align:center; padding:30px;">
      <button id="main-load-more" onclick="loadMoreMain()" style="padding:15px 30px; cursor:pointer;">Muat Lebih Banyak ↓</button>
    </div>
  </div>

  <footer>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy Policy</a>
    <a href="dmca.html">DMCA</a>
  </footer>

  <div class="modal-overlay" id="modal" onclick="if(event.target==this) closeModal()">
    <div class="modal">
      <button onclick="closeModal()" style="float:right; cursor:pointer;">✕</button>
      <div id="modal-media"></div>
      <h2 id="modal-title"></h2>
      <p id="modal-desc"></p>
      <button class="btn-secret-stream" id="btnSecretStream">🛠️ Alternatif Player (HD Server)</button>
    </div>
  </div>

  <script>
    const PROXY = 'https://api.themoviedb.org/3', API_KEY = '1e1af9892dbebb210cd4c5a3fb1588ed', IMG = 'https://image.tmdb.org/t/p/w500';
    let page = 1;

    async function loadMain() {
      const data = await (await fetch(`${PROXY}/trending/movie/week?api_key=${API_KEY}&language=id-ID`)).json();
      document.getElementById('hero-bg').style.backgroundImage = `url(https://image.tmdb.org/t/p/original${data.results[0].backdrop_path})`;
      document.getElementById('hero-title').innerText = data.results[0].title;
      // Menampilkan 15 artikel pertama
      data.results.slice(0, 15).forEach(m => {
        document.getElementById('main-row').innerHTML += `
          <div class="card" onclick="openModal(${m.id},'movie')">
            <img src="${IMG}${m.poster_path}">
            <div class="card-title">${m.title}</div>
          </div>`;
      });
    }

    async function openModal(id, type) {
      document.getElementById('modal').classList.add('open');
      const m = await (await fetch(`${PROXY}/${type}/${id}?api_key=${API_KEY}&language=id-ID`)).json();
      document.getElementById('modal-title').innerText = m.title;
      document.getElementById('modal-desc').innerText = m.overview;
      document.getElementById('btnSecretStream').onclick = () => document.getElementById('modal-media').innerHTML = `<div class="trailer-wrap"><iframe src="https://vidsrc.to/embed/${type}/${id}" allowfullscreen></iframe></div>`;
    }

    function closeModal() { document.getElementById('modal').classList.remove('open'); document.getElementById('modal-media').innerHTML = ''; }
    loadMain();
  </script>
</body>
</html>
