<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Memuat Artikel... — FlixID</title>
  <meta id="page-desc" name="description" content="Artikel FlixID">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8642572709653420" crossorigin="anonymous"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-6JDD9XZQWQ"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-6JDD9XZQWQ');</script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--red:#E50914;--dark:#0f0f0f;--text:#fff;--muted:#b3b3b3;--font-title:'Bebas Neue',sans-serif;--font-body:'DM Sans',sans-serif}
    body{background:var(--dark);color:var(--text);font-family:var(--font-body);line-height:1.7}
    nav{display:flex;align-items:center;justify-content:space-between;padding:16px 48px;background:rgba(15,15,15,0.97);border-bottom:1px solid rgba(255,255,255,0.06);position:sticky;top:0;z-index:100}
    .logo{font-family:var(--font-title);font-size:2rem;letter-spacing:2px;text-decoration:none}
    .logo span:first-child{color:#fff}.logo span:last-child{color:var(--red)}
    .nav-links{display:flex;gap:22px}.nav-links a{color:var(--muted);font-size:14px;text-decoration:none}.nav-links a:hover{color:#fff}
    .hero-article{background:linear-gradient(135deg,#0a0a0a,#1a0505,#0a0a0a);padding:60px 48px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05)}
    .article-tag{display:inline-block;background:rgba(229,9,20,0.15);border:1px solid rgba(229,9,20,0.3);color:rgba(255,130,130,0.9);padding:4px 14px;border-radius:20px;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px}
    .hero-article h1{font-family:var(--font-title);font-size:3rem;letter-spacing:2px;margin-bottom:12px;max-width:750px;margin-left:auto;margin-right:auto}
    .article-meta{font-size:13px;color:var(--muted);display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
    .content{max-width:800px;margin:0 auto;padding:48px 24px;font-size:15px;color:rgba(255,255,255,0.85)}
    .content p{margin-bottom:16px}
    .ad-slot{background:rgba(255,255,255,0.03);border:1px dashed rgba(255,255,255,0.08);border-radius:8px;padding:20px;text-align:center;margin:32px 0;min-height:90px;display:flex;align-items:center;justify-content:center}
    .cta-box{background:linear-gradient(135deg,rgba(229,9,20,0.12),rgba(229,9,20,0.03));border:1px solid rgba(229,9,20,0.2);border-radius:16px;padding:36px;text-align:center;margin-top:40px}
    .cta-box h3{font-family:var(--font-title);font-size:2rem;letter-spacing:2px;margin-bottom:10px}
    .cta-box p{font-size:14px;color:var(--muted);margin-bottom:20px}
    .btn{background:var(--red);color:#fff;border:none;padding:12px 28px;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;font-family:var(--font-body)}
    footer{padding:32px 48px;border-top:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-top:48px}
    .footer-links{display:flex;gap:20px;flex-wrap:wrap}.footer-links a{font-size:13px;color:var(--muted);text-decoration:none}.footer-links a:hover{color:#fff}
    .footer-copy{font-size:12px;color:rgba(255,255,255,0.2)}
    .loading-state{text-align:center;padding:60px 20px;color:var(--muted)}
    @media(max-width:768px){nav{padding:14px 20px}.nav-links{display:none}.hero-article{padding:40px 20px}.hero-article h1{font-size:2rem}.content{padding:32px 16px}footer{padding:24px 20px}}
  </style>
</head>
<body>
<nav>
  <a href="index.html" class="logo"><span>Flix</span><span>ID</span></a>
  <div class="nav-links"><a href="index.html">Beranda</a><a href="about.html">Tentang</a><a href="contact.html">Kontak</a></div>
</nav>

<div id="article-container">
  <div class="loading-state">⏳ Memuat artikel...</div>
</div>

<footer>
  <a href="index.html" class="logo" style="font-size:1.4rem"><span>Flix</span><span>ID</span></a>
  <div class="footer-links"><a href="index.html">Beranda</a><a href="about.html">Tentang</a><a href="privacy.html">Privasi</a><a href="contact.html">Kontak</a></div>
  <div class="footer-copy">© 2024 FlixID</div>
</footer>

<script>
  const CMS_API_URL = 'https://script.google.com/macros/s/AKfycbxACMNupjqBd-bPgBb1xj6FVcI9OH8vnQn2xdeVobMRrsDcBt9Jx83ppw0pFKNJGknR2A/exec';

  function getSlugFromURL(){
    const params = new URLSearchParams(window.location.search);
    return params.get('slug');
  }

  async function loadArtikel(){
    const slug = getSlugFromURL();
    const container = document.getElementById('article-container');

    if(!slug){
      container.innerHTML = '<div class="loading-state">❌ Artikel tidak ditemukan (slug kosong).<br><a href="index.html" style="color:var(--red)">Kembali ke Beranda</a></div>';
      return;
    }

    try {
      const res = await fetch(`${CMS_API_URL}?slug=${encodeURIComponent(slug)}`);
      const data = await res.json();

      if(!data || data.error){
        container.innerHTML = `<div class="loading-state">❌ Artikel tidak ditemukan.<br><a href="index.html" style="color:var(--red)">Kembali ke Beranda</a></div>`;
        return;
      }

      const title = data.title || 'Artikel FlixID';
      const desc = data.meta_description || '';
      const category = data.category || 'Artikel';
      const emoji = data.emoji || '📝';
      const content = data.content || '<p>Konten belum tersedia.</p>';
      const date = data.date ? new Date(data.date).toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'}) : '';

      document.getElementById('page-title').textContent = title + ' — FlixID';
      document.getElementById('page-desc').setAttribute('content', desc);

      container.innerHTML = `
        <div class="hero-article">
          <div class="article-tag">${emoji} ${category}</div>
          <h1>${title}</h1>
          <div class="article-meta"><span>📅 ${date}</span><span>•</span><span>✍️ Tim FlixID</span></div>
        </div>
        <div class="content">
          ${content}
          <div class="ad-slot"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-8642572709653420" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});</scr` + `ipt></div>
          <div class="cta-box">
            <h3>Temukan Film Lainnya di <span style="color:var(--red)">FlixID!</span></h3>
            <p>Cari film, tonton trailer, dan temukan di platform streaming mana tersedia — gratis!</p>
            <a href="index.html" class="btn">🎬 Jelajahi FlixID</a>
          </div>
        </div>`;
    } catch(e) {
      console.error(e);
      container.innerHTML = '<div class="loading-state">❌ Gagal memuat artikel. Coba lagi nanti.<br><a href="index.html" style="color:var(--red)">Kembali ke Beranda</a></div>';
    }
  }

  loadArtikel();
</script>
</body>
</html>
